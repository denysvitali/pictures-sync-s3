name: Security Scanning

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  GO_VERSION: '1.25'

jobs:
  # Job 1: Go Vulnerability Scanning
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          govulncheck -show verbose ./... 2>&1 | tee govulncheck-report.txt
        continue-on-error: true

      - name: Parse vulnerabilities
        id: parse_vuln
        run: |
          if grep -q "No vulnerabilities found" govulncheck-report.txt; then
            echo "status=clean" >> $GITHUB_OUTPUT
            echo "No vulnerabilities detected"
          elif grep -q "Vulnerability" govulncheck-report.txt; then
            echo "status=vulnerable" >> $GITHUB_OUTPUT
            echo "Vulnerabilities found!"
            exit 1
          else
            echo "status=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: govulncheck-report
          path: govulncheck-report.txt
          retention-days: 90
        if: always()

      - name: Comment PR with vulnerabilities
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && steps.parse_vuln.outputs.status == 'vulnerable'
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('govulncheck-report.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Security Vulnerabilities Detected\n\n\`\`\`\n${report}\n\`\`\``
            });

  # Job 2: Dependency Security Scanning
  nancy:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Nancy
        run: |
          curl -L -o nancy https://github.com/sonatype-nexus-community/nancy/releases/latest/download/nancy-linux.amd64-v1.0.46
          chmod +x nancy
          sudo mv nancy /usr/local/bin/

      - name: Run Nancy dependency check
        run: |
          go list -json -deps ./... | nancy sleuth 2>&1 | tee nancy-report.txt
        continue-on-error: true

      - name: Upload Nancy report
        uses: actions/upload-artifact@v4
        with:
          name: nancy-report
          path: nancy-report.txt
          retention-days: 90
        if: always()

  # Job 3: Static Application Security Testing (SAST)
  gosec:
    name: Security SAST Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-fmt sarif -out gosec-results.sarif -exclude-dir=test-data -severity medium ./...'

      - name: Upload Gosec SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif
        if: always()

      - name: Run Gosec with detailed output
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt=json -out=gosec-report.json -exclude-dir=test-data ./...
        continue-on-error: true

      - name: Upload detailed Gosec report
        uses: actions/upload-artifact@v4
        with:
          name: gosec-detailed-report
          path: gosec-report.json
          retention-days: 90
        if: always()

  # Job 4: Secret Scanning
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 90
        if: always()

  # Job 5: Trivy Vulnerability Scanner
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          scanners: 'vuln,secret,config'

      - name: Upload Trivy SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()

      - name: Run Trivy with JSON output
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
        continue-on-error: true

      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 90
        if: always()

  # Job 6: CodeQL Analysis
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

  # Job 7: License Compliance Check
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Check licenses
        run: |
          go-licenses report ./... > licenses-report.txt 2>&1 || true
          cat licenses-report.txt

      - name: Check for forbidden licenses
        run: |
          FORBIDDEN_LICENSES=("GPL-2.0" "GPL-3.0" "AGPL-3.0")
          for license in "${FORBIDDEN_LICENSES[@]}"; do
            if grep -q "$license" licenses-report.txt; then
              echo "Forbidden license detected: $license"
              exit 1
            fi
          done
          echo "No forbidden licenses found"
        continue-on-error: true

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: licenses-report
          path: licenses-report.txt
          retention-days: 90

  # Job 8: Supply Chain Security
  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard-results.sarif
        if: always()

      - name: Upload Scorecard results
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 90

  # Job 9: Configuration Security Audit
  config-audit:
    name: Configuration Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for hardcoded credentials
        run: |
          echo "Checking for hardcoded credentials..."
          # Check for common patterns
          if grep -r -i "password\s*=\s*['\"]" --include="*.go" .; then
            echo "Potential hardcoded password found!"
            exit 1
          fi
          if grep -r -i "api[_-]?key\s*=\s*['\"]" --include="*.go" .; then
            echo "Potential hardcoded API key found!"
            exit 1
          fi
          echo "No obvious hardcoded credentials found"

      - name: Check file permissions
        run: |
          echo "Checking file permissions..."
          find . -type f -name "*.sh" ! -perm -u=x -ls
          find . -type f -name "*.go" -perm /u=x,g=x,o=x -ls

      - name: Audit Go build tags
        run: |
          echo "Checking for unsafe build tags..."
          if grep -r "// +build" . --include="*.go" | grep -E "unsafe|cgo"; then
            echo "Warning: Unsafe build tags detected"
          fi

  # Job 10: Memory Safety Analysis
  memory-safety:
    name: Memory Safety Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run tests with race detector
        run: |
          go test -race -short ./... 2>&1 | tee race-report.txt
        continue-on-error: true

      - name: Check for data races
        run: |
          if grep -q "WARNING: DATA RACE" race-report.txt; then
            echo "Data races detected!"
            cat race-report.txt
            exit 1
          fi
          echo "No data races detected"

      - name: Run tests with memory sanitizer
        run: |
          go test -msan -short ./... 2>&1 | tee msan-report.txt || true
        continue-on-error: true

      - name: Upload memory safety reports
        uses: actions/upload-artifact@v4
        with:
          name: memory-safety-reports
          path: |
            race-report.txt
            msan-report.txt
          retention-days: 90
        if: always()

  # Job 11: Security Summary and Gating
  security-gate:
    name: Security Gate Check
    runs-on: ubuntu-latest
    needs: [govulncheck, gosec, gitleaks, trivy, codeql]
    if: always()

    steps:
      - name: Check security scan results
        run: |
          echo "Checking security scan results..."

          # Check govulncheck
          if [ "${{ needs.govulncheck.result }}" != "success" ]; then
            echo "❌ govulncheck failed - vulnerabilities detected"
            FAILED=true
          else
            echo "✓ govulncheck passed"
          fi

          # Check gosec
          if [ "${{ needs.gosec.result }}" != "success" ]; then
            echo "⚠️  gosec found security issues"
            # Don't fail on gosec as it may have false positives
          else
            echo "✓ gosec passed"
          fi

          # Check gitleaks
          if [ "${{ needs.gitleaks.result }}" != "success" ]; then
            echo "❌ gitleaks failed - secrets detected"
            FAILED=true
          else
            echo "✓ gitleaks passed"
          fi

          # Check trivy
          if [ "${{ needs.trivy.result }}" != "success" ]; then
            echo "⚠️  trivy found vulnerabilities"
            # Don't fail on trivy in case of network issues
          else
            echo "✓ trivy passed"
          fi

          # Check CodeQL
          if [ "${{ needs.codeql.result }}" != "success" ]; then
            echo "⚠️  CodeQL analysis had issues"
            # Don't fail on CodeQL as it runs async
          else
            echo "✓ CodeQL passed"
          fi

          if [ "$FAILED" = true ]; then
            echo ""
            echo "🚨 SECURITY GATE FAILED - Critical vulnerabilities or secrets detected"
            echo "Please review the security scan results and fix all critical issues before merging."
            exit 1
          else
            echo ""
            echo "✓ Security gate passed - No critical issues detected"
          fi

      - name: Generate security badge
        run: |
          echo "Security Status: PASSED" > security-badge.txt
        if: success()

      - name: Upload security badge
        uses: actions/upload-artifact@v4
        with:
          name: security-badge
          path: security-badge.txt
          retention-days: 30
        if: always()
