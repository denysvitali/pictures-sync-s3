name: ota-image

concurrency:
  group: ota-image-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish-flash-image:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GOKRAZY_INSTANCE: photo-backup
      GOKRAZY_PARENT_DIR: ${{ github.workspace }}/gokrazy
      IMAGE_NAME: photo-backup-rpi4b.img
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Build embedded webui bundle
        run: |
          cd webui
          corepack enable
          pnpm install --frozen-lockfile || pnpm install
          pnpm build
          if [ ! -f ../pkg/webui/dist/index.html ]; then
            echo "::error::pkg/webui/dist/index.html is missing after webui build"
            exit 1
          fi

      - name: Install gokrazy CLI
        run: |
          go install github.com/gokrazy/tools/cmd/gok@main
          echo "PATH=$PATH:$(go env GOPATH)/bin" >> "$GITHUB_ENV"

      - name: Build flashable Gokrazy image
        id: build
        env:
          GOKRAZY_INSTANCE: ${{ env.GOKRAZY_INSTANCE }}
          GOKRAZY_PARENT_DIR: ${{ env.GOKRAZY_PARENT_DIR }}
          IMAGE_DIR: ${{ github.workspace }}/ota
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GOKRAZY_IMAGE_MODE: full
        run: |
          make ota

      - name: Keep build artifact
        uses: actions/upload-artifact@v7
        with:
          name: pictures-sync-ota-flash-image
          path: ${{ steps.build.outputs.image_path }}
          if-no-files-found: error

      - name: Publish OTA release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "Photo Sync OTA ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            ${{ steps.build.outputs.image_path }}
