name: ota-image

concurrency:
  group: ota-image-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  test:
    name: Run Go tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Build embedded webui bundle
        run: |
          cd webui
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build

      - name: Run tests
        run: go test -short ./...

  build-and-publish-flash-image:
    needs: test
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    env:
      GOKRAZY_INSTANCE: photo-backup
      GOKRAZY_PARENT_DIR: ${{ github.workspace }}/gokrazy
      GOKRAZY_REPOSITORY: denysvitali/gokrazy
      GOKRAZY_REF: cf5d4d8891039b441392ea3676f594e6d9588477
      GOKRAZY_TOOLS_REPOSITORY: denysvitali/gokrazy-tools
      GOKRAZY_TOOLS_REF: 242f3106842c380a1c9a4a4473e3e3c7090f29f2
      GOKRAZY_INTERNAL_REPOSITORY: denysvitali/gokrazy-internal
      GOKRAZY_INTERNAL_REF: 516186dbfc01bdae7730e451d2b8a7c7a24e5452
      IMAGE_NAME: photo-backup-rpi4b.img
      TARGET_STORAGE_BYTES: 2147483648
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.2

      - name: Build embedded webui bundle
        run: |
          cd webui
          corepack enable
          pnpm install --frozen-lockfile || pnpm install
          pnpm build
          if [ ! -f ../pkg/webui/dist/index.html ]; then
            echo "::error::pkg/webui/dist/index.html is missing after webui build"
            exit 1
          fi

      - name: Cache gokrazy CLI
        id: cache-gok
        uses: actions/cache@v5
        with:
          path: ~/go/bin/gok
          key: ${{ runner.os }}-${{ runner.arch }}-gokrazy-gok-${{ env.GOKRAZY_TOOLS_REPOSITORY }}-${{ env.GOKRAZY_TOOLS_REF }}-${{ env.GOKRAZY_INTERNAL_REPOSITORY }}-${{ env.GOKRAZY_INTERNAL_REF }}-v1

      - name: Install gokrazy CLI
        if: steps.cache-gok.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 "https://github.com/${GOKRAZY_TOOLS_REPOSITORY}.git" /tmp/gokrazy-tools
          git -C /tmp/gokrazy-tools fetch --depth=1 origin "${GOKRAZY_TOOLS_REF}"
          git -C /tmp/gokrazy-tools checkout --detach FETCH_HEAD

          git clone --depth=1 "https://github.com/${GOKRAZY_INTERNAL_REPOSITORY}.git" /tmp/gokrazy-internal
          git -C /tmp/gokrazy-internal fetch --depth=1 origin "${GOKRAZY_INTERNAL_REF}"
          git -C /tmp/gokrazy-internal checkout --detach FETCH_HEAD

          go -C /tmp/gokrazy-tools mod edit -replace=github.com/gokrazy/internal=/tmp/gokrazy-internal
          go -C /tmp/gokrazy-tools install ./cmd/gok

      - name: Checkout Gokrazy runtime fork
        run: |
          git clone --depth=1 "https://github.com/${GOKRAZY_REPOSITORY}.git" /tmp/gokrazy
          git -C /tmp/gokrazy fetch --depth=1 origin "${GOKRAZY_REF}"
          git -C /tmp/gokrazy checkout --detach FETCH_HEAD

      - name: Add Go bin to PATH
        run: |
          echo "PATH=$PATH:$(go env GOPATH)/bin" >> "$GITHUB_ENV"

      - name: Cache static arm64 hostapd
        id: cache-hostapd
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/dist/hostapd-arm64/hostapd
          key: ${{ runner.os }}-${{ runner.arch }}-hostapd-arm64-${{ hashFiles('.github/scripts/build-hostapd-arm64.sh') }}

      - name: Build static arm64 hostapd
        if: steps.cache-hostapd.outputs.cache-hit != 'true'
        run: |
          bash .github/scripts/build-hostapd-arm64.sh

      - name: Resolve static arm64 hostapd
        id: hostapd
        shell: bash
        run: |
          hostapd_binary="${{ github.workspace }}/dist/hostapd-arm64/hostapd"
          if [ ! -x "$hostapd_binary" ]; then
            echo "::error::static arm64 hostapd binary is missing or not executable: $hostapd_binary"
            exit 1
          fi
          file "$hostapd_binary"
          if ! file "$hostapd_binary" | grep -q 'ARM aarch64'; then
            echo "::error::cached hostapd is not an arm64 binary"
            exit 1
          fi
          if ! file "$hostapd_binary" | grep -q 'statically linked'; then
            echo "::error::cached hostapd is not statically linked"
            exit 1
          fi
          echo "hostapd_binary=$hostapd_binary" >> "$GITHUB_OUTPUT"

      - name: Cache static arm64 exfatprogs
        id: cache-exfatprogs
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/dist/exfatprogs-arm64/mkfs.exfat
          key: ${{ runner.os }}-${{ runner.arch }}-exfatprogs-arm64-${{ hashFiles('.github/scripts/build-exfatprogs-arm64.sh') }}

      - name: Build static arm64 exfatprogs
        if: steps.cache-exfatprogs.outputs.cache-hit != 'true'
        run: |
          bash .github/scripts/build-exfatprogs-arm64.sh

      - name: Resolve static arm64 mkfs.exfat
        id: exfatprogs
        shell: bash
        run: |
          exfat_mkfs_binary="${{ github.workspace }}/dist/exfatprogs-arm64/mkfs.exfat"
          if [ ! -x "$exfat_mkfs_binary" ]; then
            echo "::error::static arm64 mkfs.exfat binary is missing or not executable: $exfat_mkfs_binary"
            exit 1
          fi
          file "$exfat_mkfs_binary"
          if ! file "$exfat_mkfs_binary" | grep -q 'ARM aarch64'; then
            echo "::error::cached mkfs.exfat is not an arm64 binary"
            exit 1
          fi
          if ! file "$exfat_mkfs_binary" | grep -q 'statically linked'; then
            echo "::error::cached mkfs.exfat is not statically linked"
            exit 1
          fi
          echo "exfat_mkfs_binary=$exfat_mkfs_binary" >> "$GITHUB_OUTPUT"

      - name: Cache static arm64 e2fsprogs
        id: cache-e2fsprogs
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/dist/e2fsprogs-arm64/mke2fs
          key: ${{ runner.os }}-${{ runner.arch }}-e2fsprogs-arm64-${{ hashFiles('.github/scripts/build-mke2fs-arm64.sh') }}

      - name: Build static arm64 e2fsprogs
        if: steps.cache-e2fsprogs.outputs.cache-hit != 'true'
        run: |
          bash .github/scripts/build-mke2fs-arm64.sh

      - name: Resolve static arm64 mke2fs
        id: e2fsprogs
        shell: bash
        run: |
          mke2fs_binary="${{ github.workspace }}/dist/e2fsprogs-arm64/mke2fs"
          if [ ! -x "$mke2fs_binary" ]; then
            echo "::error::static arm64 mke2fs binary is missing or not executable: $mke2fs_binary"
            exit 1
          fi
          file "$mke2fs_binary"
          if ! file "$mke2fs_binary" | grep -q 'ARM aarch64'; then
            echo "::error::cached mke2fs is not an arm64 binary"
            exit 1
          fi
          if ! file "$mke2fs_binary" | grep -q 'statically linked'; then
            echo "::error::cached mke2fs is not statically linked"
            exit 1
          fi
          echo "mke2fs_binary=$mke2fs_binary" >> "$GITHUB_OUTPUT"

      - name: Build flashable Gokrazy image
        id: build
        env:
          GOKRAZY_INSTANCE: ${{ env.GOKRAZY_INSTANCE }}
          GOKRAZY_PARENT_DIR: ${{ env.GOKRAZY_PARENT_DIR }}
          IMAGE_DIR: ${{ github.workspace }}/ota
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GOKRAZY_IMAGE_MODE: full
          TARGET_STORAGE_BYTES: ${{ env.TARGET_STORAGE_BYTES }}
          HOSTAPD_BINARY: ${{ steps.hostapd.outputs.hostapd_binary }}
          EXFAT_MKFS_BINARY: ${{ steps.exfatprogs.outputs.exfat_mkfs_binary }}
          MKE2FS_BINARY: ${{ steps.e2fsprogs.outputs.mke2fs_binary }}
          GOKRAZY_MODULE_REPLACE: /tmp/gokrazy
        run: |
          make ota

      - name: Build gokrazy root OTA image
        id: build-root
        env:
          GOKRAZY_INSTANCE: ${{ env.GOKRAZY_INSTANCE }}
          GOKRAZY_PARENT_DIR: ${{ env.GOKRAZY_PARENT_DIR }}
          IMAGE_DIR: ${{ github.workspace }}/ota
          IMAGE_NAME: photo-backup-rpi4b-root.squashfs
          GOKRAZY_IMAGE_MODE: ota
          HOSTAPD_BINARY: ${{ steps.hostapd.outputs.hostapd_binary }}
          EXFAT_MKFS_BINARY: ${{ steps.exfatprogs.outputs.exfat_mkfs_binary }}
          MKE2FS_BINARY: ${{ steps.e2fsprogs.outputs.mke2fs_binary }}
          GOKRAZY_MODULE_REPLACE: /tmp/gokrazy
        run: |
          make ota

      - name: Compress flash image for release
        id: compress
        shell: bash
        run: |
          compressed_path="${{ steps.build.outputs.image_path }}.gz"
          gzip -9 -c "${{ steps.build.outputs.image_path }}" > "$compressed_path"
          echo "compressed_path=$compressed_path" >> "$GITHUB_OUTPUT"

      - name: Compress root OTA image for release
        id: compress-root
        shell: bash
        run: |
          compressed_path="${{ steps.build-root.outputs.image_path }}.gz"
          gzip -9 -c "${{ steps.build-root.outputs.image_path }}" > "$compressed_path"
          echo "compressed_path=$compressed_path" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance for squashfs OTA image
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.build-root.outputs.image_path }}

      - name: Keep build artifact
        uses: actions/upload-artifact@v7
        with:
          name: pictures-sync-ota-flash-image
          path: |
            ${{ steps.build.outputs.image_path }}
            ${{ steps.compress.outputs.compressed_path }}
            ${{ steps.build-root.outputs.image_path }}
            ${{ steps.compress-root.outputs.compressed_path }}
          if-no-files-found: error

      - name: Compute release tag
        id: release-tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            calver="v$(date -u +'%Y.%-m.%-d.%H%M')"
            echo "tag=${calver}" >> "$GITHUB_OUTPUT"
            echo "name=Photo Sync OTA ${calver}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=Photo Sync OTA ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish OTA release
        if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          name: ${{ steps.release-tag.outputs.name }}
          prerelease: ${{ steps.release-tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            ${{ steps.compress.outputs.compressed_path }}
            ${{ steps.compress-root.outputs.compressed_path }}
