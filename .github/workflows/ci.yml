name: CI Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

env:
  GO_VERSION: '1.26'
  GOLANGCI_LINT_VERSION: v1.62.2

jobs:
  # Job 1: Build and Test
  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests with race detector
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
        timeout-minutes: 15

      - name: Generate coverage report
        run: |
          go tool cover -html=coverage.out -o coverage.html
          go tool cover -func=coverage.out -o coverage.txt

      - name: Display coverage summary
        run: |
          echo "Coverage Summary:"
          tail -n 1 coverage.txt
          COVERAGE=$(tail -n 1 coverage.txt | awk '{print $3}')
          echo "Total Coverage: $COVERAGE"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            coverage.out
            coverage.html
            coverage.txt
          retention-days: 30

  # Job 2: Build for Multiple Architectures
  build:
    name: Cross-Platform Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: linux-amd64
          - goos: linux
            goarch: arm64
            name: linux-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            name: linux-armv7

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build pictures-sync
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -v -trimpath \
            -ldflags="-s -w -X main.version=${{ github.sha }} -X main.buildDate=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            -o dist/pictures-sync-${{ matrix.name }} \
            ./cmd/pictures-sync

      - name: Build webui
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          go build -v -trimpath \
            -ldflags="-s -w -X main.version=${{ github.sha }} -X main.buildDate=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            -o dist/webui-${{ matrix.name }} \
            ./cmd/webui

      - name: Verify binaries
        run: |
          file dist/pictures-sync-${{ matrix.name }}
          file dist/webui-${{ matrix.name }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.name }}
          path: dist/*
          retention-days: 30

  # Job 3: Code Quality and Linting
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=10m --out-format=colored-line-number
          skip-cache: false
          skip-pkg-cache: false
          skip-build-cache: false

      - name: Run go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          gofmt -l .
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

  # Job 4: Dependency Analysis
  dependencies:
    name: Dependency Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check for outdated dependencies
        run: |
          go list -u -m -json all | jq -r 'select(.Update != null) | "\(.Path): \(.Version) -> \(.Update.Version)"'
          echo "Run 'go get -u ./...' to update dependencies"
        continue-on-error: true

      - name: Check for unused dependencies
        run: |
          go install github.com/golangci/gomodguard/cmd/gomodguard@latest
          gomodguard list
        continue-on-error: true

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check for direct dependency count
        run: |
          DIRECT_DEPS=$(go list -m -json all | jq -s 'map(select(.Main != true and .Indirect != true)) | length')
          echo "Direct dependencies: $DIRECT_DEPS"
          if [ "$DIRECT_DEPS" -gt 20 ]; then
            echo "Warning: High number of direct dependencies ($DIRECT_DEPS)"
          fi
        continue-on-error: true

  # Job 5: Integration Tests (if applicable)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run integration tests
        run: |
          # Run tests marked with integration tag
          go test -v -tags=integration -timeout=15m ./...
        continue-on-error: true  # Integration tests may require specific setup

      - name: Test data directory checks
        run: |
          if [ -d "test-data" ]; then
            echo "Test data directory found"
            ls -la test-data/
          fi

  # Job 6: Build Reproducibility Check
  reproducibility:
    name: Build Reproducibility
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build twice and compare
        run: |
          # First build
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o build1 ./cmd/pictures-sync
          sha256sum build1 > build1.sha256

          # Wait a moment
          sleep 2

          # Second build
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o build2 ./cmd/pictures-sync
          sha256sum build2 > build2.sha256

          # Compare
          if diff build1.sha256 build2.sha256; then
            echo "✓ Builds are reproducible!"
          else
            echo "✗ Builds are not reproducible"
            echo "Build 1: $(cat build1.sha256)"
            echo "Build 2: $(cat build2.sha256)"
            exit 1
          fi

  # Job 7: Performance Benchmarks
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run benchmarks
        run: |
          go test -bench=. -benchmem -benchtime=5s ./... | tee benchmark.txt
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: benchmark.txt
          retention-days: 30
        if: always()

  # Job 8: Generate Release Artifacts (on tags)
  release:
    name: Create Release Artifacts
    runs-on: ubuntu-latest
    needs: [test, build, lint]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Create release archives
        run: |
          mkdir -p release
          for dir in binaries-*/; do
            arch=$(basename "$dir" | sed 's/binaries-//')
            (cd "$dir" && tar czf "../release/pictures-sync-s3-${arch}.tar.gz" *)
          done

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-archives
          path: release/*
          retention-days: 90

  # Job 9: Status Check
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [test, build, lint, dependencies, reproducibility]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test job failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build job failed"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint job failed"
            exit 1
          fi
          if [ "${{ needs.dependencies.result }}" != "success" ]; then
            echo "Dependencies job failed"
            exit 1
          fi
          if [ "${{ needs.reproducibility.result }}" != "success" ]; then
            echo "Reproducibility job failed"
            exit 1
          fi
          echo "All CI checks passed!"
