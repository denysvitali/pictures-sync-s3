name: Deploy React UI

concurrency:
  group: deploy-webui-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
    paths:
      - 'webui/**'
      - '.github/workflows/deploy-webui.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Build UI assets
        run: |
          cd webui
          corepack enable
          pnpm install --frozen-lockfile || pnpm install
          pnpm build
          if [ ! -f ../pkg/webui/dist/index.html ]; then
            echo "::error::pkg/webui/dist/index.html is missing after pnpm build"
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pkg/webui/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
