# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Go module dependencies
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "denysvitali"
    labels:
      - "dependencies"
      - "go"
      - "security"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Group minor and patch updates
    groups:
      go-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "github.com/rclone/rclone"  # Update rclone carefully
        update-types:
          - "minor"
          - "patch"
    # Ignore major version updates for specific packages
    ignore:
      # Rclone needs careful testing due to breaking changes
      - dependency-name: "github.com/rclone/rclone"
        update-types: ["version-update:semver-major"]
      # Go version updates should be manual
      - dependency-name: "go"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "denysvitali"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

# Security updates will be automatically created by Dependabot
# These run separately from the version updates above
