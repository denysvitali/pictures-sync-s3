<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Photo Backup Station</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
    <!-- Custom Theme CSS -->
    <link rel="stylesheet" href="/static/css/theme.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="d-flex justify-content-between align-items-center">
                <h1>📸 Photo Backup Station</h1>
                <div class="connection-indicator" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Connecting...</span>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="app-nav">
            <ul class="nav nav-pills">
                <li class="nav-item">
                    <a href="/" class="nav-link {{if eq .ActivePage "status"}}active{{end}}">
                        📊 Status
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/history" class="nav-link {{if eq .ActivePage "history"}}active{{end}}">
                        📋 History
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/wifi" class="nav-link {{if eq .ActivePage "wifi"}}active{{end}}">
                        📶 WiFi
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/gallery" class="nav-link {{if eq .ActivePage "gallery"}}active{{end}}">
                        🖼️ Gallery
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/config" class="nav-link {{if eq .ActivePage "config"}}active{{end}}">
                        ⚙️ Configuration
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content-card">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h2 class="mb-0">Photo Gallery</h2>
                <button class="btn btn-secondary" onclick="loadFiles(currentPath)">
                    🔄 Refresh
                </button>
            </div>

            <!-- Breadcrumb Navigation -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb" id="breadcrumb">
                    <li class="breadcrumb-item active">Loading...</li>
                </ol>
            </nav>

            <!-- Gallery Grid -->
            <div id="gallery-container">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 text-muted">Loading files...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Image Preview Modal -->
    <div class="modal fade" id="image-modal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="image-modal-title">Image Preview</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="image-modal-img" src="" alt="" class="img-fluid" style="max-height: 70vh;">
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="/static/bootstrap/js/bootstrap.bundle.min.js"></script>
    <!-- Utility Functions -->
    <script src="/static/js/utils.js"></script>

    <script>
        let currentPath = '';
        let imageModal = null;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize image modal
            imageModal = new bootstrap.Modal(document.getElementById('image-modal'));

            // Load initial path from URL hash
            const initialPath = getPathFromHash();
            loadFiles(initialPath);

            createWebSocket(() => {}, null, null);

            // Event delegation for file navigation and preview
            document.addEventListener('click', (e) => {
                if (e.target.matches('a[data-action="navigate"]') || e.target.closest('a[data-action="navigate"]')) {
                    e.preventDefault();
                    const link = e.target.matches('a[data-action="navigate"]') ? e.target : e.target.closest('a[data-action="navigate"]');
                    const path = link.getAttribute('data-path');
                    navigateToPath(path || '');
                } else if (e.target.matches('[data-action="preview"]') || e.target.closest('[data-action="preview"]')) {
                    e.preventDefault();
                    const item = e.target.matches('[data-action="preview"]') ? e.target : e.target.closest('[data-action="preview"]');
                    const path = item.getAttribute('data-path');
                    const name = item.getAttribute('data-name');
                    if (path) previewImage(path, name);
                }
            });

            // Handle browser back/forward
            window.addEventListener('hashchange', () => {
                const path = getPathFromHash();
                loadFiles(path);
            });
        });

        // Load files for a given path
        async function loadFiles(path = '') {
            currentPath = path;
            const container = document.getElementById('gallery-container');
            showLoading(container);

            try {
                const url = path ? `/api/files?path=${encodeURIComponent(path)}` : '/api/files';
                const data = await apiRequest(url);

                if (data.error) {
                    showError(container, data.error);
                    return;
                }

                displayFiles(data.files || []);
                updateBreadcrumb(path);
            } catch (error) {
                console.error('Failed to load files:', error);
                showError(container, error.message);
            }
        }

        // Display files in list
        function displayFiles(files) {
            const container = document.getElementById('gallery-container');

            if (!files || files.length === 0) {
                showEmptyState(container, 'No files found in this location', '📁');
                return;
            }

            let html = '<div class="list-group gallery-list">';

            files.forEach(file => {
                const isImage = /\.(jpg|jpeg|png|gif|webp)$/i.test(file.name);
                const isVideo = /\.(mp4|mov|avi|mkv)$/i.test(file.name);
                const isDir = file.isDir || file.is_dir;
                const fileSize = file.size ? formatBytes(file.size) : '';
                const modTime = file.mod_time ? new Date(file.mod_time).toLocaleDateString() : '';

                if (isDir) {
                    html += `
                        <a href="#path=${encodeURIComponent(file.name)}"
                           data-action="navigate"
                           data-path="${escapeHtml(file.name)}"
                           class="list-group-item list-group-item-action d-flex align-items-center">
                            <div class="me-3 text-primary" style="font-size: 1.5rem;">📁</div>
                            <div class="flex-grow-1">
                                <div class="fw-bold">${escapeHtml(file.name)}</div>
                                <small class="text-muted">Folder</small>
                            </div>
                            <div class="text-muted">
                                <span style="font-size: 1.2rem;">❯</span>
                            </div>
                        </a>
                    `;
                } else if (isImage) {
                    html += `
                        <div class="list-group-item d-flex align-items-center cursor-pointer"
                             data-action="preview"
                             data-path="${escapeHtml(file.path || file.name)}"
                             data-name="${escapeHtml(file.name)}">
                            <div class="me-3">
                                <img src="/api/thumbnail?path=${encodeURIComponent(file.path || file.name)}"
                                     alt="${escapeHtml(file.name)}"
                                     style="width: 48px; height: 48px; object-fit: cover; border-radius: 4px;"
                                     loading="lazy"
                                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22%3E%3Crect fill=%22%23ddd%22 width=%2248%22 height=%2248%22/%3E%3Ctext fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3E📷%3C/text%3E%3C/svg%3E'">
                            </div>
                            <div class="flex-grow-1">
                                <div class="fw-bold">${escapeHtml(file.name)}</div>
                                <small class="text-muted">
                                    📷 Image${fileSize ? ` • ${fileSize}` : ''}${modTime ? ` • ${modTime}` : ''}
                                </small>
                            </div>
                            <div class="text-muted">
                                <span style="font-size: 1.2rem;">🔍</span>
                            </div>
                        </div>
                    `;
                } else if (isVideo) {
                    html += `
                        <div class="list-group-item d-flex align-items-center">
                            <div class="me-3 text-danger" style="font-size: 1.5rem;">🎬</div>
                            <div class="flex-grow-1">
                                <div class="fw-bold">${escapeHtml(file.name)}</div>
                                <small class="text-muted">
                                    🎬 Video${fileSize ? ` • ${fileSize}` : ''}${modTime ? ` • ${modTime}` : ''}
                                </small>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="list-group-item d-flex align-items-center">
                            <div class="me-3 text-secondary" style="font-size: 1.5rem;">📄</div>
                            <div class="flex-grow-1">
                                <div class="fw-bold">${escapeHtml(file.name)}</div>
                                <small class="text-muted">
                                    📄 File${fileSize ? ` • ${fileSize}` : ''}${modTime ? ` • ${modTime}` : ''}
                                </small>
                            </div>
                        </div>
                    `;
                }
            });

            html += '</div>';
            container.innerHTML = html;
        }

        // Update breadcrumb navigation
        function updateBreadcrumb(path) {
            const breadcrumb = document.getElementById('breadcrumb');
            let html = '<li class="breadcrumb-item"><a href="#" data-action="navigate" data-path="">🏠 Home</a></li>';

            if (path) {
                const parts = path.split('/').filter(p => p);
                let currentPath = '';

                parts.forEach((part, index) => {
                    currentPath += (currentPath ? '/' : '') + part;
                    const isLast = index === parts.length - 1;

                    if (isLast) {
                        html += `<li class="breadcrumb-item active" aria-current="page">${escapeHtml(part)}</li>`;
                    } else {
                        html += `<li class="breadcrumb-item"><a href="#path=${encodeURIComponent(currentPath)}" data-action="navigate" data-path="${escapeHtml(currentPath)}">${escapeHtml(part)}</a></li>`;
                    }
                });
            }

            breadcrumb.innerHTML = html;
        }

        // URL routing helpers
        function getPathFromHash() {
            const hash = window.location.hash;
            if (hash.startsWith('#path=')) {
                return decodeURIComponent(hash.substring(6));
            }
            return '';
        }

        function navigateToPath(path) {
            const encodedPath = encodeURIComponent(path);
            window.location.hash = path ? `path=${encodedPath}` : '';
            loadFiles(path);
        }

        // Preview image in modal
        function previewImage(path, name) {
            const modalImg = document.getElementById('image-modal-img');
            const modalTitle = document.getElementById('image-modal-title');

            modalTitle.textContent = name || 'Image Preview';
            modalImg.src = `/api/files/view?path=${encodeURIComponent(path)}`;
            modalImg.alt = name || '';

            imageModal.show();
        }
    </script>
</body>
</html>
