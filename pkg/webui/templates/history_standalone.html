<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Photo Backup Station</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
    <!-- Custom Theme CSS -->
    <link rel="stylesheet" href="/static/css/theme.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="d-flex justify-content-between align-items-center">
                <h1>📸 Photo Backup Station</h1>
                <div class="connection-indicator" id="connection-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Connecting...</span>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="app-nav">
            <ul class="nav nav-pills">
                <li class="nav-item">
                    <a href="/" class="nav-link {{if eq .ActivePage "status"}}active{{end}}">
                        📊 Status
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/history" class="nav-link {{if eq .ActivePage "history"}}active{{end}}">
                        📋 History
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/wifi" class="nav-link {{if eq .ActivePage "wifi"}}active{{end}}">
                        📶 WiFi
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/gallery" class="nav-link {{if eq .ActivePage "gallery"}}active{{end}}">
                        🖼️ Gallery
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/config" class="nav-link {{if eq .ActivePage "config"}}active{{end}}">
                        ⚙️ Configuration
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Sync History</h2>
                <button class="btn btn-secondary" onclick="loadHistory()">
                    🔄 Refresh
                </button>
            </div>

            <!-- History Timeline -->
            <div id="history-timeline">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3 text-muted">Loading sync history...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="/static/bootstrap/js/bootstrap.bundle.min.js"></script>
    <!-- Utility Functions -->
    <script src="/static/js/utils.js"></script>

    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            createWebSocket(() => {}, null, null);
        });

        // Load sync history from API
        async function loadHistory() {
            const timeline = document.getElementById('history-timeline');
            showLoading(timeline);

            try {
                const data = await apiRequest('/api/history');
                displayHistory(data);
            } catch (error) {
                console.error('Failed to load history:', error);
                showError(timeline, error.message);
            }
        }

        // Display history timeline
        function displayHistory(history) {
            const timeline = document.getElementById('history-timeline');

            if (!history || history.length === 0) {
                showEmptyState(timeline, 'No sync history available yet', '📋');
                return;
            }

            let html = '<div class="history-timeline">';

            history.forEach((item, index) => {
                const statusClass = getStatusClass(item.status);
                const statusIcon = getStatusIcon(item.status);
                const duration = calculateDuration(item.start_time, item.end_time);

                html += `
                    <div class="history-item ${statusClass}">
                        <div class="card">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <div>
                                        <h5 class="card-title mb-1">
                                            ${statusIcon} ${escapeHtml(item.card_id || 'Unknown Card')}
                                        </h5>
                                        <p class="text-muted small mb-0">
                                            ${formatDate(item.start_time)}
                                        </p>
                                    </div>
                                    <span class="badge ${getStatusBadgeClass(item.status)}">
                                        ${escapeHtml((item.status || 'unknown').toUpperCase())}
                                    </span>
                                </div>

                                <div class="row g-2 mt-2">
                                    <div class="col-6 col-md-3">
                                        <div class="text-muted small">Files Synced</div>
                                        <div class="fw-bold">${item.files_synced || 0}</div>
                                    </div>
                                    <div class="col-6 col-md-3">
                                        <div class="text-muted small">Data Transferred</div>
                                        <div class="fw-bold">${formatBytes(item.bytes_synced || 0)}</div>
                                    </div>
                                    <div class="col-6 col-md-3">
                                        <div class="text-muted small">Duration</div>
                                        <div class="fw-bold">${duration}</div>
                                    </div>
                                    ${item.files_total ? `
                                    <div class="col-6 col-md-3">
                                        <div class="text-muted small">Total Files</div>
                                        <div class="fw-bold">${item.files_total}</div>
                                    </div>
                                    ` : ''}
                                </div>

                                ${item.error_message ? `
                                <div class="alert alert-danger mb-0 mt-3">
                                    <strong>Error:</strong> ${escapeHtml(item.error_message)}
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            timeline.innerHTML = html;
        }

        // Get status class for timeline item
        function getStatusClass(status) {
            const statusMap = {
                'completed': 'status-success',
                'success': 'status-success',
                'error': 'status-error',
                'failed': 'status-error'
            };
            return statusMap[status] || '';
        }

        // Get status icon
        function getStatusIcon(status) {
            const iconMap = {
                'completed': '✅',
                'success': '✅',
                'error': '❌',
                'failed': '❌',
                'cancelled': '⏹️'
            };
            return iconMap[status] || '🔄';
        }

        // Get Bootstrap badge class for status
        function getStatusBadgeClass(status) {
            const classMap = {
                'completed': 'bg-success',
                'success': 'bg-success',
                'error': 'bg-danger',
                'failed': 'bg-danger',
                'cancelled': 'bg-secondary',
                'syncing': 'bg-primary'
            };
            return classMap[status] || 'bg-secondary';
        }

        // Calculate duration between two dates
        function calculateDuration(startTime, endTime) {
            if (!startTime || !endTime) return '-';
            const start = new Date(startTime);
            const end = new Date(endTime);
            const durationSeconds = Math.round((end - start) / 1000);
            return formatDuration(durationSeconds);
        }
    </script>
</body>
</html>
